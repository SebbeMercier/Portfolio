services:
  - type: web
    name: sebbe-slm-assistant
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    envVars:
      - key: NODE_ENV
        value: production
      - key: OLLAMA_HOST
        value: 0.0.0.0:11434
    healthCheckPath: /api/health
    autoDeploy: true
    buildCommand: echo "Building SLM Assistant..."
    startCommand: node server.js